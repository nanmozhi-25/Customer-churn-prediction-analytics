<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Background Linear Gradient -->
    <linearGradient id="auroraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="50%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <!-- Wave Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Rounded Base Icon Background -->
  <rect x="5" y="5" width="90" height="90" rx="24" fill="url(#auroraGrad)" />

  <!-- Core Signal Tower / Neural Apex -->
  <g transform="translate(50, 60)" stroke="#FFFFFF" stroke-linecap="round" fill="none">
    <!-- Tower Legs -->
    <path d="M-15 25 L-2 -15 M15 25 L2 -15" stroke-width="4.5" />
    <!-- Tower Braces -->
    <path d="M-9 12 L9 12 M-5 0 L5 0" stroke-width="3" opacity="0.8" />
    <!-- Central Beam -->
    <line x1="0" y1="25" x2="0" y2="-20" stroke-width="3" opacity="0.9" />
    
    <!-- Central Glowing Neural Apex Node -->
    <circle cx="0" cy="-22" r="7" fill="#FFFFFF" stroke="none" filter="url(#glow)" />
    
    <!-- Neural Node Connections (AI Branching) -->
    <line x1="0" y1="-22" x2="-22" y2="-38" stroke-width="2.5" stroke-dasharray="2 2" opacity="0.9" />
    <line x1="0" y1="-22" x2="22" y2="-38" stroke-width="2.5" stroke-dasharray="2 2" opacity="0.9" />
    
    <circle cx="-22" cy="-38" r="4.5" fill="#FFFFFF" stroke="none" />
    <circle cx="22" cy="-38" r="4.5" fill="#FFFFFF" stroke="none" />
  </g>

  <!-- Telecom Network Signal Waves (Glow Enabled) -->
  <g stroke="#FFFFFF" stroke-linecap="round" fill="none" stroke-width="3.5" filter="url(#glow)">
    <path d="M 32 26 A 25 25 0 0 1 68 26" opacity="0.4" />
    <path d="M 22 16 A 38 38 0 0 1 78 16" opacity="0.7" />
    <path d="M 12 6 A 52 52 0 0 1 88 6" opacity="0.9" />
  </g>
</svg>